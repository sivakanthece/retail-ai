name: CI — Lint & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  backend-lint-test:
    name: Backend — Python lint & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff pytest httpx pytest-asyncio

      - name: Lint with ruff
        run: ruff check backend/ --ignore E501

      - name: Run backend tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///./test.db
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd backend
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found — skipping"

  frontend-lint:
    name: Frontend — Node lint & build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build check
        run: cd frontend && npm run build --if-present

      - name: Lint (if configured)
        run: cd frontend && npm run lint --if-present || true
