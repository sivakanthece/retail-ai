name: Deploy — Build & Push Docker

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  IMAGE_NAME: retail-ai

jobs:
  build-and-push:
    name: Build Docker image & push to registry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build the Docker image ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            HF_MODEL_REPO=sivakanthece/retail-ai-yolo
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Option A: Deploy to Hugging Face Spaces ────────────────────────────────
  deploy-hf-spaces:
    name: Sync to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_TARGET == 'hf' || vars.DEPLOY_TARGET == '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space (history-free, no large files)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}   # e.g. YourUsername/retail-ai
        run: |
          git config --global user.email "ci@retail-ai"
          git config --global user.name "Retail AI CI"

          # Create a brand-new orphan branch with only the current file tree.
          # This avoids pushing git history that contains large model files.
          git checkout --orphan hf-deploy

          # Remove any .pt/.onnx model files from this snapshot
          find . -name "*.pt" -o -name "*.onnx" | xargs git rm --cached -f 2>/dev/null || true
          find . -name "*.pt" -o -name "*.onnx" | xargs rm -f 2>/dev/null || true

          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M') — ${GITHUB_SHA::7}"

          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}
          git push hf hf-deploy:main --force

  # ── Option B: Deploy to a VPS / cloud server via SSH ──────────────────────
  deploy-server:
    name: Deploy to Server (SSH)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_TARGET == 'server' }}

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/retail-ai
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/retail-ai:latest
            docker compose down
            docker compose up -d
            docker image prune -f
