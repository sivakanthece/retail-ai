name: Deploy — Build & Push Docker

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  IMAGE_NAME: retail-ai

jobs:
  build-and-push:
    name: Build Docker image & push to registry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Build the Docker image ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            HF_MODEL_REPO=sivakanthece/retail-ai-yolo
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Option A: Deploy to Hugging Face Spaces ────────────────────────────────
  deploy-hf-spaces:
    name: Sync to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_TARGET == 'hf' || vars.DEPLOY_TARGET == '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space (exclude large model files)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}   # e.g. YourUsername/retail-ai
        run: |
          git config --global user.email "ci@retail-ai"
          git config --global user.name "Retail AI CI"

          # Remove large model weights from the HF push (they are downloaded at build time)
          git rm --cached backend/best.pt 2>/dev/null || true
          git rm --cached backend/*.pt 2>/dev/null || true

          # Commit the removal if anything changed
          git diff --cached --quiet || git commit -m "chore: exclude model weights from HF push"

          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}
          git push hf main --force

  # ── Option B: Deploy to a VPS / cloud server via SSH ──────────────────────
  deploy-server:
    name: Deploy to Server (SSH)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_TARGET == 'server' }}

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/retail-ai
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/retail-ai:latest
            docker compose down
            docker compose up -d
            docker image prune -f
